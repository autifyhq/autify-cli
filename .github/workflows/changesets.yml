name: Changesets

on:
  push:
    branches:
      - main

concurrency:
  group: changesets
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # Open/update the Version PR if pending changesets exist, otherwise signal
  # that we should publish. The publish script is a noop here — it just flips
  # `outputs.published` to true so downstream jobs run. The actual GitHub
  # release is created later, after upload completes, by the `release` job.
  changesets:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - uses: ./.github/actions/setup

      - id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          title: "chore: release packages"
          commit: "chore: release packages"
          version: |
            npx changeset version
            npx oclif readme --repository-prefix='<%- repo %>/blob/@autifyhq/autify-cli@<%- version %>/<%- commandPath %>'
          # Publish must be a single command (action splits on whitespace).
          publish: bash scripts/changesets-detect-publish.sh
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

  # Build and upload binaries to S3 (multi-platform via workflow_call).
  upload:
    needs: [changesets]
    if: needs.changesets.outputs.published == 'true'
    uses: ./.github/workflows/upload.yml

  # Create the GitHub release. The release event triggers publish.yml which
  # handles S3 channel promotion, npm publish, and Homebrew tap update.
  release:
    needs: [upload]
    runs-on: ubuntu-latest
    steps:
      - id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - uses: ./.github/actions/setup

      - name: Create GitHub release
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          # Only tag the CLI itself, not the integration-test workspace.
          publish: bash scripts/changesets-tag.sh
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
