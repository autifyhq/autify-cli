name: Pull requests

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    with:
      branch: ${{ github.base_ref }}

  upload:
    needs: [lint]
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    uses: ./.github/workflows/upload.yml

  integration-tests:
    needs: [upload]
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    uses: ./.github/workflows/integration-tests.yml

  e2e-tests:
    needs: [upload]
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    uses: ./.github/workflows/e2e-tests.yml
    secrets:
      AUTIFY_CLI_E2E_AUTIFY_MOBILE_ACCESS_TOKEN: ${{ secrets.AUTIFY_CLI_E2E_AUTIFY_MOBILE_ACCESS_TOKEN }}

  github-actions-tests:
    needs: [upload]
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    uses: ./.github/workflows/github-actions-tests.yml

  approved:
    needs: [integration-tests, e2e-tests, github-actions-tests]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ github.head_ref }}" == changeset-release/* ]]; then
            echo "Approved (changesets version PR)"
            exit 0
          fi
          if [[ "${{ needs.integration-tests.result }}" == "success" && "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "Approved!"
          else
            echo "Not approved!"
            exit 1
          fi
