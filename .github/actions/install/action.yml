name: Install
description: Install from S3

inputs:
  target:
    description: target
    required: true

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup
    - uses: ./.github/actions/inject-build-metadata
    - run: npm ci
      shell: bash
    - run: npm run release install ${{ inputs.target }}
      shell: bash
      env:
        HOMEBREW_AUTIFY_CLI_PR_BUILD: ${{ github.event_name == 'pull_request' && '1' || '' }}
