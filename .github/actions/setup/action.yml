name: Setup
description: Setup

inputs:
  aws-credentials:
    description: AWS credentials
    required: false

runs:
  using: composite
  steps:
    # https://github.com/jdx/mise-action/releases/tag/v4.0.1
    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
    # Install setuptools for node-gyp on Windows (required by os-proxy-config dependency)
    # Python 3.12+ removed distutils, but setuptools provides it
    - if: runner.os == 'Windows'
      run: pip install setuptools
      shell: bash
    - run: npm ci
      shell: bash
    - uses: aws-actions/configure-aws-credentials@v4
      if: ${{ inputs.aws-credentials == 'upload' }}
      with:
        role-to-assume: arn:aws:iam::434848343351:role/autify-cli-upload-only-role
        role-session-name: github-actions
        aws-region: us-west-2
    - uses: aws-actions/configure-aws-credentials@v4
      if: ${{ inputs.aws-credentials == 'main' }}
      with:
        role-to-assume: arn:aws:iam::434848343351:role/autify-cli-beta-release-role
        role-session-name: github-actions
        aws-region: us-west-2
    - uses: aws-actions/configure-aws-credentials@v4
      if: ${{ startsWith(inputs.aws-credentials, 'releases/') || inputs.aws-credentials == 'publish' }}
      with:
        role-to-assume: arn:aws:iam::434848343351:role/autify-cli-release-role
        role-session-name: github-actions
        aws-region: us-west-2
