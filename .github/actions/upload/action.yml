name: Upload
description: Upload to S3

inputs:
  target:
    description: target
    required: true

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup
      with:
        aws-credentials: upload
    - if: ${{ inputs.target == 'win' }}
      run: sudo apt-get install nsis
      shell: bash
    - uses: ./.github/actions/inject-build-metadata
    - run: npm ci
      shell: bash
    - run: npm run release upload ${{ inputs.target }}
      shell: bash
